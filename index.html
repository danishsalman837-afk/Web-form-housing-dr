<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housing Lead Capture — Agent Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ios-blue: #007aff;
      --ios-gray: #f2f2f7;
      --ios-text: #1c1c1e;
      --ios-label: #8e8e93;
      --card-bg: rgba(255, 255, 255, 0.85);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e7eb 100%);
      color: var(--ios-text);
      margin: 0;
      padding: clamp(20px, 5vw, 60px) 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .form-container {
      width: 100%;
      max-width: 650px;
      animation: fadeIn 0.8s cubic-bezier(0.2, 0, 0.2, 1);
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .subtitle {
      text-align: center;
      color: var(--ios-label);
      font-size: 17px;
      margin-bottom: 40px;
    }

    .section-group {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      padding: 4px 0; /* iOS List style */
      margin-bottom: 25px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .field-row {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
    }
    .field-row:last-child { border-bottom: none; }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ios-label);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 17px;
      color: var(--ios-text);
      padding: 4px 0;
      outline: none;
      font-family: inherit;
    }

    input::placeholder { color: #c7c7cc; }

    textarea { min-height: 60px; resize: none; }

    /* Custom Checkbox */
    .checkbox-row {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
    }
    .checkbox-row label { margin-bottom: 0; text-transform: none; font-size: 17px; color: var(--ios-text); font-weight: 400; }
    
    input[type="checkbox"] {
      width: 26px;
      height: 26px;
      accent-color: var(--ios-blue);
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      background: var(--ios-blue);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 30px;
      transition: all 0.3s cubic-bezier(0.2, 0, 0.2, 1);
      box-shadow: 0 8px 25px rgba(0, 122, 255, 0.3);
    }

    .btn-submit:hover {
      transform: translateY(-2px) scale(1.01);
      opacity: 0.9;
    }
    
    .btn-submit:active { transform: scale(0.98); }

    .hidden { display: none; }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dob-input { letter-spacing: 1px; color: var(--ios-blue); font-weight: 600; }

    /* Conditional Styles */
    .nested-section {
      background: rgba(0,0,0,0.02);
      margin: 0 10px 10px 10px;
      border-radius: 12px;
      border-left: 4px solid var(--ios-blue);
    }

    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      body { padding: 40px 15px; }
      .section-group { border-radius: 14px; }
    }
  </style>
</head>

<body>
  <div class="form-container">
    <h1>Lead Capture</h1>
    <p class="subtitle">Complete the client details below</p>

    <form id="disrepairForm">
      <!-- Section: Client Profile -->
      <div class="section-group">
        <div class="field-row">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Smith" required>
        </div>
        <div class="field-row">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="example@mail.com">
        </div>
        <div class="field-row">
          <label>Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="07123 456789" required>
        </div>
        <div class="field-row">
          <label>Date of Birth</label>
          <input type="text" id="dob" name="dob" class="dob-input" placeholder="DD / MM / YYYY" maxlength="14">
        </div>
      </div>

      <!-- Section: Location & Status -->
      <div class="section-group">
        <div class="field-row">
          <label>Property Address</label>
          <textarea name="address" placeholder="Line 1, Postcode" required></textarea>
        </div>
        <div class="field-row">
          <label>Tenant Type</label>
          <select name="tenantType" required>
            <option value="">Select Tenant Type</option>
            <option value="Council Tenant">Council Tenant</option>
            <option value="Housing Association Tenant">Housing Association Tenant</option>
          </select>
        </div>
        <div class="field-row">
          <label>Residence Duration</label>
          <input type="text" name="livingDuration" placeholder="e.g. 5 Years" required>
        </div>
      </div>

      <!-- Section: Damage Details -->
      <div class="section-group">
        <div class="field-row">
          <label>Damp or Mould?</label>
          <select name="damp" id="damp" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
        <div id="dampDetails" class="hidden nested-section">
          <div class="field-row"><label>Location</label><input type="text" name="dampLocation" placeholder="e.g. Master Bedroom"></div>
          <div class="field-row"><label>Rooms Affected</label><input type="text" name="dampRooms" placeholder="e.g. 2"></div>
          <div class="field-row"><label>Health Issues?</label><input type="text" name="dampHealth" placeholder="Yes/No"></div>
        </div>

        <div class="field-row">
          <label>Leaks Present?</label>
          <select name="leak" id="leak" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
        <div id="leakDetails" class="hidden nested-section">
          <div class="field-row"><label>Source</label><input type="text" name="leakSource" placeholder="e.g. Roof"></div>
          <div class="field-row"><label>When Started?</label><input type="text" name="leakStart" placeholder="e.g. Last Month"></div>
        </div>
      </div>

      <!-- Section: Other Issues -->
      <div class="section-group">
        <div class="field-row">
          <label>Other Structural Issues?</label>
          <select name="issues" id="issues" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
        <div id="issuesDetails" class="hidden nested-section">
          <div class="checkbox-row field-row" style="flex-direction: row; border-bottom: none;">
            <label>Faulty Electrics</label>
            <input type="checkbox" name="issueType" value="Faulty Electrics" id="check_electrics">
          </div>
          <div class="checkbox-row field-row" style="flex-direction: row; border-bottom: none;">
            <label>Heating / Boiler Issues</label>
            <input type="checkbox" name="issueType" value="Heating / Boiler Issues" id="check_heating">
          </div>
          <div class="checkbox-row field-row" style="flex-direction: row; border-bottom: none;">
            <label>Structural Cracks</label>
            <input type="checkbox" name="issueType" value="Cracks / Structural Damage" id="check_structural">
          </div>
        </div>
      </div>

      <!-- Section: Financial & Reporting -->
      <div class="section-group">
        <div class="field-row">
          <label>Landlord Reported over 1 month ago?</label>
          <select name="reported" id="reported" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
        <div class="field-row">
          <label>Rental Arrears? (<£1000)</label>
          <select name="arrears" id="arrears" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-submit">Submit Lead</button>
    </form>
  </div>

  <script>
    // Masked DOB
    const dobInput = document.getElementById('dob');
    dobInput.addEventListener('input', function(e) {
      let v = this.value.replace(/\D/g,'');
      if (v.length > 8) v = v.substring(0,8);
      let out = "";
      if (v.length > 0) out += v.substring(0,2);
      if (v.length >= 3) out += " / " + v.substring(2,4);
      if (v.length >= 5) out += " / " + v.substring(4,8);
      this.value = out;
    });

    // Toggle Logic
    function setupToggle(selectId, detailId) {
      const select = document.getElementById(selectId);
      const details = document.getElementById(detailId);
      select.addEventListener("change", () => {
        details.classList.toggle("hidden", select.value !== "Yes");
      });
    }

    setupToggle("damp", "dampDetails");
    setupToggle("leak", "leakDetails");
    setupToggle("issues", "issuesDetails");
    setupToggle("reported", "reportedDetails");
    setupToggle("arrears", "arrearsDetails");

    // Form Submit
    document.getElementById("disrepairForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());
      data.issueType = formData.getAll("issueType");

      fetch("/api/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(async response => {
        if (response.ok) {
          alert("Lead Recorded Successfully");
          location.reload();
        } else {
          alert("Submission Error: Check console");
        }
      })
      .catch(err => alert("Connection Error"));
    });
  </script>
</body>
</html>
